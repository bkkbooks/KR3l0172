body:
  text: 全一卷卷一二書所載共一百七十六條猶未備也乃復續補焉初莽妻以莽殺其子涕泣失明令太子臨居中養焉莽妻旁侍者原碧莽幸之後臨亦通焉恐事泄謀共殺莽臨妻愔國師公女能為星語宮中偶有白衣會臨喜以為所謀且成後貶為義陽王出在外第愈憂恐會莽妻病困臨手書曰上於子孫至嚴前長孫中孫年俱有三十而死今臣臨復適三十誠恐一旦不保中室則不知死命所在莽候妻疾見其書大怒疑臨有惡意不令得會喪既葬收原碧等考問具服姦謀殺狀初莽為侯就國時幸侍者增秩懷能開明懷能生男興增秩生男匡女開明生女捷皆留新國以其不明故也王莽傳皇太子詠武陵王左右五皓傳杯詩曰頂分如兩髻簪長驗上頭捉杯如欲轉疑殘已復留玉臺新詠楚春申君有愛妾曰余春申君正妻之子曰甲余欲君之棄其妻也因自傷其身以視君而泣曰得為君妾甚幸雖然適夫人非所以事君也適君非所以事夫人也身故不肖力不足以適二主其勢不俱適與其死夫人所者不若賜死君前妾以賜死若復幸於左右願君必察之無為人笑君因信妾余之詐為棄正妻余又欲殺甲而以其子為後因自裂其親身衣之裏以示君而泣曰余之得幸君之日久矣甲非不知也今乃欲強戲余余與爭之至裂余衣此子不孝莫大於此矣君怒而殺甲韓非子劉曠豫章海昏人義熙二年病困頓二十餘日手足皆冷正腹微暖二日二夜蹶然起坐云有人著平幘喚曠西北向有樓其上有綵女圃坐作樂見曠住樂相指而笑游歷未遍不知所從而出倏忽至此病於此都愈後月餘黨輩於平澤射獵留曠守舍因晝眠聞語何女郎通使便覺颯然已至自說東海何氏八歲而夭於今十歲應為君妻故來修好何女郎曰昔日樓上之擊節我也衆以君見棄是以相笑智瓊杜蘭香咸我曹也婢名採薇奴名邊羅常以九石合拌奠果問家中吉凶及晴雨之占必驗曠母妻嫌之被妬日滋女曰應為君妻妬嫌已至三年而無子何以見忌後留信宿曠家以湯澆之慘然而言曰茍不我容便與君辭既去之後慎勿相憶為君纍也幽明録煬帝自到廣陵沉湎失度每睡須搖動或歌吹聲齊方就一夢侍兒韓俊娥尤得意每寢必令振舉支節乃得睡不厭賜名為來夢兒蕭妃密令訊之帝不舒汝能安之豈有他媚俊娥進言妾從帝自都城來帝在何妥車車行高下不等妾態自搖帝就搖洽悅妾後得以侍寢私效車中之態成寢非他媚也他日蕭妃譖去之帝暇日登迷樓憶之題柱二篇云黯黯悲侵骨綿綿病欲成須知藩兵鬢強半為多情又不信長思憶絲從鬢裏生間來倚柱立相望幾多情大業拾遺唐思元大夫崔義起妻蕭氏蕭鏗女也為人妬忌多瞋好打奴婢不信業報麟德元年從駕洛陽至二年五月身亡蕭所愛婢名閏玉信樂佛法家為夫人設三七齊僧正食時夫人自來看齊枷項鎖腰獄卒衛從唯閏玉見夫人靈著此婢使傳語家內大小云吾適崔氏為性多瞋橫不信因果今至地獄受罪極重願汝眷屬將吾平生受用資具速舍至七七日為設齊云云法苑珠林余媚娘者才婦也夫亡以介潔自守陸希聲時為正郎聞其容美而善書巧智無比俾行人中善言者游說之媚娘乃約媒曰陸郎中若必得兒侍巾櫛須立誓不置側室及女奴則可為陸家新婦希聲諾之既歸二年夫妻敦睦無何希聲又獲名姬柳舜英者姿殊麗逾於媚娘媚娘知而深怨之密銜不發異日令迎入宅與之同處比間候希聲他出即召舜英閉私室中手刃殺之余媚娘敘録蜀青石鎮陳洪裕妻丁氏因妬忌打殺婢金扈潛於本家埋瘞仍榜通衢云金扈逃走經年遷居夾江因夏潦漂壞舊居渠岸見死婢容質不變鎮將報州追勘擬伏其婢尸一夕壞爛遂置丁氏于法警戒録前南鄭尉李雲於長安求納一姬其母未許雲曰豫誓不婚乃許之號姬曰楚賓數年後姬卒卒後經歲遂婚前南鄭沈氏及婚日雲浴於淨室見楚賓執一貼藥末徑前謂雲曰誓余不婚今又與沈家作壻無物相奉贈君香一貼以資沐浴寫藥末入斛中以叉攪水訖而去雲甚覺不安羸困不能出浴遂死支體如綿筋骨並散聞奇録潞之女伶曰孟思賢巧黠人也嘗為君侯王制之寵貯焉制之所私伊宙亦衙門將多與制遊思賢舍故僕射慎之子也風流善杯酒思賢心悅之遂私焉關鎖益牢即踰牆而奔於宙制知不可奈何遂逐思賢出門宙且納焉宙有女奴曰解兒有愛於宙思賢心忌之一日杖解兒脛間出血見骨解兒瘡甚死明年長慶二年軍亂伊宙遇飛矢而死思賢無所庇復投制制得之喜曰有甘吾心者矣遂命以短兵關思賢二脛踣且極捶之制臨觀語思賢曰其能踰牆而奔於伊宙耶逮夜間於幽室思賢終夜呼曰解兒解兒不能惠我速死耶竟不勝其楚毒再宿而死遂與宙同瘞於邢之東門外昭義軍記室別録吳太伯祠在東閶門之西每春秋季市肆相率合牢醴祈福于三讓王多圖善馬綵輿子女以獻之時乙丑春有金銀行首糾合其徒以輕綃畫美人侍婢捧胡琴以從其貌出於舊繪者名美人為勝兒蓋戶牖牆壁間前後所獻者無以匹也女巫方舞有進士劉景復送客之金陵置酒于廟之東通波館忽缺伸思寢乃就榻夢見紫衣冠者言曰讓王奉屈劉生隨至廟周旋揖讓而坐王語劉生曰適納一胡琴妓藝甚精而色姝麗知吾子善歌故奉邀作胡琴一章以寵其藝初生頗不甘命酌人間酒一杯與飲逡巡酒至并獻酒物視之乃向館中祖筵者生飲數杯而醉作歌曰繁弦已停雜吹歇勝兒調弄邏逤撥四絃櫳撚三四聲喚起邊風駐明月大聲嘈嘈奔淈淈浪蹙波翻倒溟渤小絃切切怨颸颸鬼哭神悲任悉窣倒腕斜挑掣流電春雷直戛騰秋鶻漢妃徒得端正名秦女虛誇有仙骨我聞天寶十年前涼州未作西戎窟麻衣右袵皆漢民不省胡塵暫逢勃太平之末狂胡亂犬豕崩騰姿唐突玄宗未到萬里橋東洛西京一時沒一朝漢民沒為虜飲恨吞聲空嗢咽時看漢月望漢民怨氣衝聲成彗孛國門之西八九鎮高城深疊閉間卒河湟咫尺不能收挽粟推車徒兀兀今朝聞奏涼州曲使我心魂暗超忽勝兒若向邊塞彈征人血淚應闌干歌成劉生乘醉落魄草札而獻王尋繹數四召勝兒以授之王之侍兒見有不樂者妬色形於坐中恃酒以金如意擊勝兒面破血淋襟袖生乃驚起明日素繪果有損痕歌今傳於吳中纂異記石季龍趫捷便弓馬勇冠當時勒深嘉之拜征虜將軍為聘將軍郭榮妹為妻季龍寵惑優僮鄭櫻桃而殺郭氏更納清河崔氏女櫻桃又譖而殺之晉書載記成風聞成季之繇乃事之而屬僖公焉杜預注成風莊公之妾僖公之母也左傳閔二年元載寵姬瑤英之母趙姬本岐王愛妾也後出為薛氏妻生瑤英杜陽編前書只載瑤事故續補此隋煬帝幸月觀中夜憑蕭妃肩說東宮時事適有小黃門映薔薇叢調宮婢衣帶為薇剌骨結笑聲吃吃不止帝望見腰肢纖弱意為寶兒而有私帝披單衣長衫不帶急行擒之乃宮婢雅娘也大業拾遺霍小玉命侍兒櫻桃褰幃執燭授李生筆硯又取珠絡縫繡囊中出越姬烏絲襴素段以授生生素多才思援筆成章薛防霍小玉傳前已載浣紗桂子獨遺此事長安中有媒氏鮑十一娘故薛蒼駙馬家青衣也折券從良十餘年矣性便僻巧言語豪家戚里無不經過追風挾策推為渠帥嘗受李生誠託厚賂意頗德之經數月忽聞扣門甚急生攝衣迎問曰鮑卿今日何故惠然而來云云霍小玉傳崔氏鶯鶯婢曰紅娘嘗為崔持綵箋以授張生元微之鶯鶯傳平陸尉薛昭元和中坐謫有田山叟者贈藥一粒教令遁去因入蘭昌宮見雲髻仙衣女子三人詢其姓氏長曰雲容姓張氏次曰鳳臺姓蕭氏次曰蘭翹姓劉氏飲酣蘭翹命骰子白二女曰今夜佳賓相逢須有匹偶請擲骰子遇采強者得以薦枕席雲容數勝蘭翹遂命薛郎近雲容姊坐昭發問曰夫人何許人也何以屆此容曰某乃開元中楊貴妃之侍兒也妃念極嘗獨舞霓裳於繡嶺宮妃悅贈我詩曰羅袖動香香不已紅蕖裊裊青煙裏輕雲嶺上乍搖風嫩柳池邊初拂水詩成皇帝吟諷久之亦有繼和但我不憶耳此時多遇皇帝與申天師談道亦數侍天師茶藥因間處叩頭乞藥師云吾不惜但汝無今日之分不久處世如何我曰朝聞道夕死可矣師乃與降雪丹一粒曰汝但服之雖死不壞但能大其壠廣其冗舍以真玉踈而有風使魂不蕩空魄不沈寂而有物拘制陶出陰陽數百年若遇生人得交精之氣或再生便為地仙耳昭因詰天師之狀乃田山叟之魁梧也乃大駭曰山叟即申天師明矣不然何以委曲使余符曩日之事哉裴鉶薛昭傳唐監察御史清河張佶侍兒仙鵝能歌舞解書翰常出使以仙鵝充使典有密知者將發之佶鉤巨多數竟得不發禦史臺記沈詢在昭義嘗宴府中賓友歌著詞令曰莫打南來鴈從他向北飛打時雙打取休使兩分離及歸而夫妻皆為嬖妾歸秦所殺北夢瑣言申胡子朔客李氏之蒼頭也李氏本亦世家子得祀江夏王廟吾與對舍於長安崇義里遂將衣質酒命余合飲氣熟杯闌因謂吾曰李長吉爾徒能長調不能作五言歌詩直強回筆端與陶謝詩勢相遠幾里吾請撰申胡子栗歌以五字斷句歌成朔客大喜擎觴起立命花娘出幕徘徊拜客稱善三弄於是以弊辭配聲與豫為壽李賀集謝秀才有妾縞練改從於人秀才引留之不得後生感憶座人製詩嘲謝賀復繼四首李賀集梁元帝為妾弘夜姝謝東宮齎合心花叉啓曰夜姝昔往陽臺雖逄四照曾遊澧浦慣識九衢未有仍我爵叉還勝翠羽飾以南金裝茲麗玉修靡夫人本分章華之裏中山孺子獨荷春宮之恩有志當熊無期投閣藝文類聚木門梁元帝為妾夏王豐謝東宮賚錦啓略曰舒將並石堪來暮雨縈持結纜剩可蕩舟藝文類聚錦門長沙定王發母唐姬故程姬侍者景帝召程姬程姬有所避不願進而飾侍者唐兒使夜進上醉不知以為程姬而幸之前漢廣川王去有所幸姬王昭平王地餘許以為后去常疾姬陽成昭信待視甚謹更愛之去與地餘戲得裒中刀笞問狀服欲與昭平共殺昭信笞問平不服以鐵針針之強服乃會諸姬去以劍自擊地餘令昭信擊昭平皆死立昭信為后幸姬陶望卿為修靡夫人主繒帛崔修成為明真夫人主永巷昭信復譖望卿云云後云數召姬榮愛與飲昭信復譖之云云前漢禽滑釐問於子墨子曰魯氏有叔姪同處者叔曰無恆姪曰數奇無恆有妾曰善佞蓄私夫以生子曰不類數奇愛不類如其子無恆久乃告數奇曰不類非吾子他人之子也汝勿以為弟李文公集王丞相有幸妾姓雷頗預政事納賄蔡公謂之雷尚書世說
